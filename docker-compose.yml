services:
  mysql:
    image: mysql:8.0
    container_name: phonebook-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: phonebook
    volumes:
      - phonebook-mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mysql/conf/my.cnf:/etc/mysql/conf.d/my.cnf
    restart: always

  redis:
    image: redis:7
    container_name: phonebook-redis
    ports:
      - "6380:6379"
    restart: always

  backend:
    build: ./backend
    container_name: phonebook-backend
    ports:
      - "8082:8081"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root123456
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    restart: always

  nginx:
    build: ./frontend
    container_name: phonebook-nginx
    ports:
      - "8888:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: always

volumes:
  phonebook-mysql-data:
