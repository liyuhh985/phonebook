<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电话本</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 400px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #764ba2;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result.error {
            background: #fee;
            color: #c00;
        }
        .result.success {
            background: #efe;
            color: #060;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📞 电话本</h1>
        <div class="search-box">
            <input type="text" id="nameInput" placeholder="输入姓名搜索...">
            <button onclick="search()">搜索</button>
        </div>
        <div id="result" class="result"></div>
    </div>

    <script>
        document.getElementById('nameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') search();
        });

        function search() {
            const name = document.getElementById('nameInput').value.trim();
            if (!name) {
                showResult('请输入姓名', 'error');
                return;
            }

            fetch('/api/search?name=' + encodeURIComponent(name))
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showResult(data.data.name + ': ' + data.data.phone, 'success');
                    } else {
                        showResult('未找到联系人', 'error');
                    }
                })
                .catch(error => {
                    showResult('查询失败: ' + error.message, 'error');
                });
        }

        function showResult(message, type) {
            const result = document.getElementById('result');
            result.textContent = message;
            result.className = 'result show ' + type;
        }
    </script>
</body>
</html>
